name: FlickFix Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Install ffmpeg                          # ← unindented
        run: choco install ffmpeg -y --no-progress
        
      - name: Run PowerShell unit tests
        shell: pwsh
        run: |
          & ".\Tests\Run-Tests.ps1"
          exit $LASTEXITCODE
          
      - name: Compression smoke test (real encode)   # ← unindented
        shell: pwsh
        run: |
          & ".\Tests\Run-CompressionSmoke.ps1"
          exit $LASTEXITCODE

      - name: Install Node dependencies
        run: npm install
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Start web server
        shell: pwsh
        run: |
          Start-Process powershell -ArgumentList "-File", "$PWD\web\server.ps1" -WindowStyle Hidden
          Start-Sleep -Seconds 5
      - name: Run Playwright UI tests
        run: npx playwright test Tests/ui.spec.js